<!doctype html>
<html lang="en">
<head>
    <script>
        // Explicit window assignments: happy-dom runs classic scripts in a
        // function scope, so bare declarations would not become globals and
        // the stub would silently protect nothing
        window.eval = function () { throw new Error('eval is disabled on this page'); };
        globalThis.eval = window.eval;
        window.Function = function () { throw new Error('Function is disabled on this page'); };
    </script>
    <meta charset="utf-8">
    <title>Todo — app.js example</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app"></div>
<script type="module">
    import Component from '/app.js';

    new Component({
        element: document.querySelector('#app'),
        data: {draft: '', nextId: 1, todos: []},
        methods: {
            addTodo(event) {
                event.preventDefault();

                const title = this.data.draft.trim();

                if (!title) {
                    return;
                }

                this.data.todos = [...this.data.todos, {id: this.data.nextId, title, done: false}];
                this.data.nextId += 1;
                this.data.draft = '';
            },
            toggleTodo(event) {
                this.data.todos = this.data.todos.map(todo => todo.id === event.detail ? {...todo, done: !todo.done} : todo);
            },
            removeTodo(event) {
                this.data.todos = this.data.todos.filter(todo => todo.id !== event.detail);
            },
            // Formatters are just methods, called through a |> pipe from the template
            left(todos) {
                return todos.filter(todo => !todo.done).length;
            },
        },
    });
</script>
</body>
</html>

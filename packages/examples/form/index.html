<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Form — app.js example</title>
</head>
<body>
<div id="app"></div>
<script type="module">
    import Component from '/app.js';

    new Component({
        element: document.querySelector('#app'),
        data: {name: '', user: {email: ''}, subscribe: false, plan: 'free', contact: 'email'},
        methods: {
            submit(event) {
                event.preventDefault();
                console.log(`Submitted: name=${this.data.name}, email=${this.data.user.email}, subscribe=${this.data.subscribe}, plan=${this.data.plan}, contact=${this.data.contact}`);
            },
        },
    });
</script>
</body>
</html>
